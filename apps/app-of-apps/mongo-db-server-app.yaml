apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mongodb
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://charts.bitnami.com/bitnami
    chart: mongodb
    targetRevision: 13.3.1
    helm:
      releaseName: mongodb
      values: |
        architecture: standalone
        auth:
          enabled: true
          rootPassword: rootpassword
          username: user
          password: password
          database: mydatabase
#        persistence:
#          size: 8Gi
  destination:
    namespace: mongodb
    server: 'https://kubernetes.default.svc'
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - PruneLast=true
      - ApplyOutOfSyncOnly=true
      - ServerSideApply=true
